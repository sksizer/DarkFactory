name: TS CI
on:
  push:
    branches: [main]
    paths:
      - 'ts/**'
  pull_request:
    paths:
      - 'ts/**'
jobs:
  ts-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ts/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
