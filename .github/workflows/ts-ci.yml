name: TS CI
on:
  push:
    branches: [main]
    paths:
      - 'ts/**'
  pull_request:
    paths:
      - 'ts/**'
jobs:
  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd ts && bun install
      - run: cd ts && bun run typecheck
      - run: cd ts && bun run lint
      - run: cd ts && bun test
