[project]
name = "prd-harness"
version = "0.1.0"
description = "SDLC harness for the Pumice PRD lifecycle: DAG orchestration, declarative workflows, agent invocation, stacked PRs."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[project.scripts]
prd = "prd_harness.cli:main"

[dependency-groups]
dev = [
    "mypy>=1.10",
    "pytest>=8.0",
    "types-PyYAML>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prd_harness"]

[tool.mypy]
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
no_implicit_optional = true
files = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
